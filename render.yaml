services:
  - type: web
    name: chatbot-electoral
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Esto permite que pongas la llave en el Dashboard de Render manualmente
